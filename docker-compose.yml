services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: orderbook
      POSTGRES_USER: orderbook
      POSTGRES_PASSWORD: orderbook_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/src/migrations/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orderbook"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://orderbook:orderbook_dev@postgres:5432/orderbook
      ENGINE_PATH: /usr/local/bin/orderbook_server
      PORT: "3001"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - server

volumes:
  pgdata:
